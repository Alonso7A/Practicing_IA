<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Mis Tareas</h1>
      <p class="subtitle">Organiza tus pendientes a corto y largo plazo</p>
    </div>
    <div class="clock">
      <div id="time">--:--:--</div>
      <div id="date">--</div>
    </div>
  </header>

  <main class="container">
    <section class="actions">
      <button id="btn-add" class="btn btn-primary">+ Agregar tarea</button>
      <div class="filter-group">
        <label>Filtrar:</label>
        <select id="filter-type">
          <option value="all">Todas</option>
          <option value="corto">Corto plazo</option>
          <option value="largo">Largo plazo</option>
        </select>
      </div>
    </section>

    <section class="board">
      <div class="column">
        <h2>Pendientes <span id="count-active" class="count">0</span></h2>
        <div id="list-active" class="task-list"></div>
        <p id="empty-active" class="empty">No hay tareas pendientes. ¡Agrega una!</p>
      </div>

      <div class="column">
        <h2>Completadas <span id="count-done" class="count">0</span></h2>
        <div id="list-done" class="task-list"></div>
        <p id="empty-done" class="empty">Aún no has completado tareas.</p>
      </div>
    </section>
  </main>

  <!-- Modal Agregar/Editar -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">Nueva tarea</h2>
      <form id="task-form">
        <label>
          Título
          <input type="text" id="f-title" required maxlength="80" placeholder="¿Qué tienes que hacer?">
        </label>

        <label>
          Tipo
          <select id="f-type" required>
            <option value="corto">Corto plazo</option>
            <option value="largo">Largo plazo</option>
          </select>
        </label>

        <div class="row">
          <label>
            Inicio
            <input type="datetime-local" id="f-start" required>
          </label>
          <label>
            Fecha límite
            <input type="datetime-local" id="f-deadline" required>
          </label>
        </div>

        <label>
          Tiempo estimado (horas)
          <input type="number" id="f-estimated" min="0" step="0.5" placeholder="Ej. 2.5">
        </label>

        <label>
          Descripción (opcional)
          <textarea id="f-desc" rows="2" maxlength="300" placeholder="Notas, detalles..."></textarea>
        </label>

        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
